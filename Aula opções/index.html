<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title>Aula Opções</title>
    </head>
    <body>
        <form action="index.html" method="post">
            <h1>Radio: </h1>
            <!-- Atributos name dos inputs precisam ser iguais -->
            <input type="radio" id="r1" name="radio"><label for="r1">- 1</label><br>
            <input type="radio" id="r2" name="radio"><label for="r2">- 2</label><br>
            <input type="radio" id="r3" name="radio"><label for="r3">- 3</label><br>
            <input type="radio" id="r4" name="radio"><label for="r4">- 4</label><br>
            <input type="radio" id="r5" name="radio"><label for="r5">- 5</label><br>
            <h1>Checkbox: </h1>
            <input type="checkbox" id="b1" name="checkbox"><label for="b1">- 1</label><br>
            <input type="checkbox" id="b2" name="checkbox"><label for="b2">- 2</label><br>
            <input type="checkbox" id="b3" name="checkbox"><label for="b3">- 3</label><br>
            <input type="checkbox" id="b4" name="checkbox"><label for="b4">- 4</label><br>
            <input type="checkbox" id="b5" name="checkbox"><label for="b5">- 5</label><br>
            <input type="submit" name="Enviar">
        </form>
    </body>
</html>
