<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title>Prática 05</title>
    </head>
    <body>
        <h1>Cadastro</h1>
        <form action="index.html" method="post">

            <label for="Nome">
                Nome: <input type="text" id="Nome" name="Nome">
            </label>
            <br>
            <br>
            <label for="E-mail">
                E-mail: <input type="email" id="E-mail" name="E-mail">
            </label>
            <br>
            <br>
            <label for="Senha">
                Senha: <input type="password" id="Senha" name="Senha">
            </label>
            <br>
            <br>
            <label for="Idade">
                Idade: <input type="number" id="Idade" name="Idade">
            </label>
            <br>
            <br>
            <label for="Data de Nascimento">
                Data de Nascimento: <input type="date" id="Data de Nascimento" name="Data de Nascimento">
            </label>
            <br>
            <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
    </body>
</html>
